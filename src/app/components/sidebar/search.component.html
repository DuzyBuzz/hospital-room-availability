<section>
  <label for="hospital-search" class="sr-only">Search hospitals</label>
  <div class="relative">
    <svg class="pointer-events-none absolute left-4 top-1/2 h-5 w-5 -translate-y-1/2 text-slate-400" viewBox="0 0 20 20" fill="currentColor" aria-hidden="true">
      <path fill-rule="evenodd" d="M9 3.5A5.5 5.5 0 1 0 9 14.5A5.5 5.5 0 0 0 9 3.5Zm-7 5.5a7 7 0 1 1 12.032 4.86l3.304 3.304a1 1 0 0 1-1.414 1.414l-3.304-3.304A7 7 0 0 1 2 9Z" clip-rule="evenodd"></path>
    </svg>
    <input
      id="hospital-search"
      type="search"
      [value]="query()"
      (input)="onInput($event)"
      placeholder="Search hospitals…"
      class="w-full rounded-3xl border border-slate-200 bg-slate-50 py-4 pl-12 pr-4 text-base text-slate-700 outline-none transition placeholder:text-slate-400 focus:border-sky-400 focus:bg-white focus:shadow-[0_0_0_4px_rgba(14,165,233,0.12)]"
    />
  </div>
</section>
