<section class="bg-white" aria-label="Hospital results">
  @if (loading()) {
    <div class="divide-y divide-slate-200">
      @for (placeholder of [1, 2, 3, 4, 5]; track placeholder) {
        <div class="px-4 py-3.5">
          <div class="h-4 w-2/3 rounded-full bg-slate-200"></div>
          <div class="mt-2 h-3 w-1/2 rounded-full bg-slate-100"></div>
          <div class="mt-3 h-3 w-5/6 rounded-full bg-slate-100"></div>
        </div>
      }
    </div>
  } @else if (hospitals().length > 0) {
    <div role="list" class="divide-y divide-slate-200">
      @for (hospital of hospitals(); track hospital.id) {
        <button
          type="button"
          role="listitem"
          (click)="hospitalSelected.emit(hospital.id)"
          [attr.aria-pressed]="selectedHospitalId() === hospital.id"
          class="group w-full border-l-2 border-transparent px-4 py-3.5 text-left transition-colors hover:bg-slate-50 focus:outline-none focus-visible:bg-slate-50 focus-visible:ring-2 focus-visible:ring-inset focus-visible:ring-sky-200"
          [class.border-sky-500]="selectedHospitalId() === hospital.id"
          [class.bg-slate-50]="selectedHospitalId() === hospital.id"
        >
          <div class="flex items-start justify-between gap-3">
            <div class="min-w-0 flex-1">
              <p class="truncate text-sm font-semibold text-slate-900">{{ hospital.name }}</p>
              <p class="mt-0.5 text-xs text-slate-500">{{ hospital.category }}</p>
            </div>

            <span
              class="inline-flex shrink-0 items-center gap-1.5 rounded-full border px-2 py-0.5 text-[11px] font-semibold"
              [style.background-color]="statusMeta(hospital).chipBackground"
              [style.color]="statusMeta(hospital).chipText"
              [style.border-color]="statusMeta(hospital).chipBorder"
            >
              <span class="h-2 w-2 rounded-full" [style.background-color]="statusMeta(hospital).accent"></span>
              {{ statusMeta(hospital).label }}
            </span>
          </div>

          <div class="mt-2 flex items-center gap-2 text-xs">
            <span class="inline-flex items-center gap-1 text-slate-500 min-w-0 flex-1">
              <i class="pi pi-map-marker text-[10px]" aria-hidden="true"></i>
              <span class="truncate">{{ locationLabel(hospital) }}</span>
            </span>

            <span class="shrink-0 rounded-full bg-slate-100 px-2 py-0.5 font-medium text-slate-700 group-hover:bg-white">
              {{ roomSummary(hospital) }}
            </span>
          </div>
        </button>
      }
    </div>
  } @else {
    <div class="px-4 py-8 text-center">
      <p class="text-sm font-semibold text-slate-700">No hospitals match the current search.</p>
      <p class="mt-1 text-xs text-slate-500">Try another keyword or reset the filters.</p>
    </div>
  }
</section>
