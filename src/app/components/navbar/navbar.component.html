<p-toolbar styleClass="maps-prime-navbar">
  <ng-template #start>
    <div class="maps-prime-navbar__brand">
      <p-avatar icon="pi pi-building-columns" shape="circle" styleClass="maps-prime-navbar__avatar" />

      <div class="maps-prime-navbar__copy">
        <p class="maps-prime-navbar__eyebrow">{{ eyebrow() }}</p>
        <p class="maps-prime-navbar__title">{{ dashboardTitle() }}</p>
        <p class="maps-prime-navbar__subtitle">{{ subtitle() }}</p>
      </div>
    </div>
  </ng-template>

  <ng-template #end>
    <div class="maps-prime-navbar__actions">
      <p-tag [value]="facilityCount() + ' facilities live'" severity="info" styleClass="maps-prime-navbar__tag hidden xl:flex" />
      <p-tag [value]="openRooms() + ' rooms open'" severity="success" styleClass="maps-prime-navbar__tag hidden xl:flex" />

      @if (showLocateButton()) {
        <button
          pButton
          type="button"
          icon="pi pi-send"
          [rounded]="true"
          [text]="true"
          severity="secondary"
          (click)="locateRequested.emit()"
          aria-label="Locate me on the map"
        ></button>
      }

      <a pButton [routerLink]="primaryRouteLink()" severity="secondary" [outlined]="true" class="hidden lg:inline-flex">
        {{ primaryRouteLabel() }}
      </a>

      <a pButton [routerLink]="secondaryRouteLink()" severity="contrast" class="hidden lg:inline-flex">
        {{ secondaryRouteLabel() }}
      </a>

      @if (showMobilePanelButton()) {
        <button
          pButton
          type="button"
          severity="secondary"
          [outlined]="true"
          class="lg:hidden"
          (click)="mobilePanelRequested.emit()"
          [attr.aria-expanded]="mobilePanelExpanded()"
        >
          {{ mobilePanelButtonLabel() }} ({{ mobilePanelButtonCount() }})
        </button>
      }

      @if (authService.loading()) {
        <p-tag value="Checking session..." severity="secondary" styleClass="maps-prime-navbar__tag hidden sm:flex" />
      } @else if (authService.isAuthenticated()) {
        <p-tag [value]="authService.displayName()" severity="contrast" styleClass="maps-prime-navbar__tag hidden sm:flex" />

        <button pButton type="button" severity="secondary" [text]="true" (click)="void authService.signOut()">
          Sign Out
        </button>
      } @else {
        <button pButton type="button" severity="secondary" [text]="true" (click)="authService.openModal('signIn')">
          Sign In
        </button>

        <button pButton type="button" severity="contrast" (click)="authService.openModal('signUp')">
          Create Account
        </button>
      }
    </div>
  </ng-template>
</p-toolbar>

<app-auth-modal />
